<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TicketFlow</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="TicketFlow dashboard">
        <div>
          <p class="eyebrow">TicketFlow</p>
          <h1>Панель бронирования</h1>
        </div>
        <div class="status-pill" id="authStatus">Гость</div>
      </section>

      <section class="grid">
        <article class="panel auth-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">01</p>
              <h2>Пользователь</h2>
            </div>
            <button class="icon-button" id="clearTokenBtn" title="Выйти" type="button" aria-label="Выйти">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l-1.4-1.4 2.6-2.6H3v-2h8.2L8.6 8.4 10 7l5 5-5 5zm7 4h-5v-2h5V5h-5V3h5c1.1 0 2 .9 2 2v14c0 1.1-.9 2-2 2z"/></svg>
            </button>
          </div>

          <div class="tabs" role="tablist" aria-label="Режим авторизации">
            <button class="tab active" data-auth-mode="register" type="button">Регистрация</button>
            <button class="tab" data-auth-mode="login" type="button">Вход</button>
          </div>

          <form id="authForm" class="form">
            <label>
              Email
              <input id="email" type="email" autocomplete="email" value="dev@example.com" required>
            </label>
            <label id="nameField">
              Имя
              <input id="name" type="text" autocomplete="name" value="Dev">
            </label>
            <label>
              Пароль
              <input id="password" type="password" autocomplete="current-password" value="secret123" required minlength="6">
            </label>
            <button class="primary" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a5 5 0 015 5v3h1a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2v-8a2 2 0 012-2h1V7a5 5 0 015-5zm3 8V7a3 3 0 00-6 0v3h6z"/></svg>
              <span id="authSubmitText">Создать пользователя</span>
            </button>
          </form>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">02</p>
              <h2>Новое событие</h2>
            </div>
          </div>
          <form id="eventForm" class="form">
            <label>
              Название
              <input id="eventTitle" type="text" value="Go Junior Conf" required>
            </label>
            <label>
              Начало
              <input id="eventStartsAt" type="datetime-local" required>
            </label>
            <div class="row">
              <label>
                Цена, коп.
                <input id="eventPrice" type="number" min="0" step="100" value="2500" required>
              </label>
              <label>
                Билетов
                <input id="eventCapacity" type="number" min="1" value="20" required>
              </label>
            </div>
            <button class="primary" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H5V9h14v10zM7 11h5v5H7v-5z"/></svg>
              Создать событие
            </button>
          </form>
        </article>

        <article class="panel events-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">03</p>
              <h2>События</h2>
            </div>
            <button class="icon-button" id="refreshEventsBtn" title="Обновить события" type="button" aria-label="Обновить события">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.7 6.3A8 8 0 104 12H2l3-3 3 3H6a6 6 0 111.8 4.2l-1.4 1.4A8 8 0 1019.1 4.9l-1.4 1.4z"/></svg>
            </button>
          </div>
          <div id="eventsList" class="list"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">04</p>
              <h2>Заказ</h2>
            </div>
          </div>
          <form id="orderForm" class="form">
            <label>
              Event ID
              <input id="orderEventID" type="text" placeholder="Выбери событие из списка" required>
            </label>
            <div class="row">
              <label>
                Кол-во
                <input id="orderQuantity" type="number" min="1" value="1" required>
              </label>
              <label>
                Idempotency key
                <input id="idempotencyKey" type="text" required>
              </label>
            </div>
            <button class="primary" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14.8h7.5c.8 0 1.5-.4 1.8-1.1L20 7H6.2L5.3 5H2V3h4.6l1.1 2.4L9 8h7.7l-1.9 3.8H8.1L7.2 14.8z"/></svg>
              Купить билет
            </button>
          </form>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">05</p>
              <h2>Уведомления</h2>
            </div>
            <button class="icon-button" id="refreshNotificationsBtn" title="Обновить уведомления" type="button" aria-label="Обновить уведомления">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 002.45-2h-4.9A2.5 2.5 0 0012 22zm6-6v-5a6 6 0 10-12 0v5l-2 2v1h16v-1l-2-2z"/></svg>
            </button>
          </div>
          <div id="notificationsList" class="list compact"></div>
        </article>

        <article class="panel log-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">API</p>
              <h2>Ответы</h2>
            </div>
            <button class="icon-button" id="clearLogBtn" title="Очистить лог" type="button" aria-label="Очистить лог">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 19c0 1.1.9 2 2 2h8a2 2 0 002-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4h-3.5z"/></svg>
            </button>
          </div>
          <pre id="apiLog">Готов к запросам.</pre>
        </article>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
