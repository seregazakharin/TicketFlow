services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow
      POSTGRES_DB: ticketflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d ticketflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ticketflow
    volumes:
      - ./migrations:/migrations:ro
    command: ["sh", "-c", "psql -h postgres -U ticketflow -d ticketflow -f /migrations/001_init.sql"]
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: .
      args:
        SERVICE: user-service
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment: &app-env
      DATABASE_URL: postgres://ticketflow:ticketflow@postgres:5432/ticketflow?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      JWT_SECRET: dev-secret-change-me
      PASSWORD_PEPPER: dev-pepper-change-me
    ports:
      - "8081:8081"

  event-service:
    build:
      context: .
      args:
        SERVICE: event-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8082:8082"

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      event-service:
        condition: service_started
    environment:
      <<: *app-env
      EVENT_SERVICE_URL: http://event-service:8082
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    environment:
      <<: *app-env
    ports:
      - "8084:8084"

  api-gateway:
    build:
      context: .
      args:
        SERVICE: api-gateway
    depends_on:
      - user-service
      - event-service
      - order-service
      - notification-service
    environment:
      USER_SERVICE_URL: http://user-service:8081
      EVENT_SERVICE_URL: http://event-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
    ports:
      - "8080:8080"

volumes:
  postgres-data:
